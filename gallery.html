<title>Arya Art Gallery</title>

<style>
body{
font-family:Arial,sans-serif;
background:#fff5f8;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#e91e63;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
}

.gallery img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    border-radius:15px;
}

.gallery img:hover{
transform:scale(1.05);
}



</style>
</head>
